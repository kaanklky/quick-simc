map $http_accept_encoding $wasm_variant {
    default     "";
    "~*\bbr\b"  ".br";
    "~*gzip"    ".gz";
}

server {
    listen ${PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = /assets/wasm/simc.wasm {
        default_type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Vary "Accept-Encoding" always;

        if ($wasm_variant = ".br") {
            rewrite ^ /internal/wasm-br last;
        }
        if ($wasm_variant = ".gz") {
            rewrite ^ /internal/wasm-gz last;
        }
        try_files /assets/wasm/simc.wasm =404;
    }

    location = /internal/wasm-br {
        internal;
        default_type application/wasm;
        add_header Content-Encoding "br" always;
        add_header Vary "Accept-Encoding" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /assets/wasm/simc.wasm.br =404;
    }

    location = /internal/wasm-gz {
        internal;
        default_type application/wasm;
        add_header Content-Encoding "gzip" always;
        add_header Vary "Accept-Encoding" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /assets/wasm/simc.wasm.gz =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
