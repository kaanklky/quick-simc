<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick SimC</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="preload" as="fetch" href="/assets/wasm/simc.wasm" crossorigin>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">&#9876;</span>
          <div>
            <h1>Quick SimC</h1>
            <span class="subtitle">SimulationCraft / Midnight</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="input-section">
        <div class="section-header">
          <h2>Character Profile</h2>
          <div class="actions">
            <button id="btn-clear" class="btn btn-ghost">Clear</button>
            <button id="btn-simulate" class="btn btn-primary">Simulate</button>
          </div>
        </div>
        <textarea id="simc-input" spellcheck="false" placeholder="Paste your SimC addon export here..."></textarea>
        <div class="options-row">
          <label class="option-label" for="fight-style">Fight Style</label>
          <select id="fight-style" class="select">
            <option value="">Default (Patchwerk)</option>
          </select>
        </div>
      </section>

      <section id="progress-section" class="progress-section hidden">
        <div class="progress-header">
          <h2>Simulation Progress</h2>
          <button id="btn-cancel" class="btn btn-ghost btn-sm">Cancel</button>
        </div>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-details">
          <span id="progress-phase"></span>
          <span id="progress-iter"></span>
          <span id="progress-speed"></span>
          <span id="progress-eta"></span>
        </div>
      </section>

      <section id="result-section" class="result-section hidden">
        <div class="result-header">
          <h2 id="result-title">Results</h2>
        </div>
        <div class="result-content">
          <div class="character-card">
            <div class="character-info">
              <h3 id="result-name">-</h3>
              <div class="character-details">
                <span id="result-race-class">-</span>
                <span class="separator">|</span>
                <span id="result-spec">-</span>
                <span class="separator">|</span>
                <span id="result-realm">-</span>
              </div>
            </div>
          </div>
          <div class="dps-display">
            <div class="dps-main">
              <span class="dps-label">DPS</span>
              <span id="result-dps" class="dps-value">-</span>
            </div>
            <div class="dps-details">
              <div class="dps-stat">
                <span class="stat-label">Min</span>
                <span id="result-dps-min" class="stat-value">-</span>
              </div>
              <div class="dps-stat">
                <span class="stat-label">Max</span>
                <span id="result-dps-max" class="stat-value">-</span>
              </div>
              <div class="dps-stat">
                <span class="stat-label">Median</span>
                <span id="result-dps-median" class="stat-value">-</span>
              </div>
            </div>
          </div>
          <div class="sim-meta">
            <span id="result-iterations">-</span>
            <span id="result-fight-length">-</span>
            <span id="result-error">-</span>
          </div>
        </div>
      </section>

      <section id="error-section" class="error-section hidden">
        <div class="error-content">
          <h3>Error</h3>
          <pre id="error-message"></pre>
        </div>
      </section>

      <section id="log-section" class="log-section hidden">
        <div class="log-header">
          <h2>Log</h2>
          <button id="btn-toggle-log" class="btn btn-ghost btn-sm">Show</button>
        </div>
        <pre id="log-output" class="log-output hidden"></pre>
      </section>
    </main>
  </div>

  <script src="/assets/js/app.js"></script>
</body>
</html>
