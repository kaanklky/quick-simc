map $http_accept_encoding $wasm_variant {
    default     "";
    "~*\bbr\b"  ".br";
    "~*gzip"    ".gz";
}

server {
    listen ${PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location ~ ^/assets/wasm/(?<wasm_dir>[a-f0-9]+)/simc\.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Vary "Accept-Encoding" always;

        if ($wasm_variant = ".br") {
            rewrite ^ /internal/wasm-br/$wasm_dir last;
        }
        if ($wasm_variant = ".gz") {
            rewrite ^ /internal/wasm-gz/$wasm_dir last;
        }
        try_files $uri =404;
    }

    location ~ ^/internal/wasm-br/(?<wasm_dir>[a-f0-9]+)$ {
        internal;
        default_type application/wasm;
        add_header Content-Encoding "br" always;
        add_header Vary "Accept-Encoding" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /assets/wasm/$wasm_dir/simc.wasm.br =404;
    }

    location ~ ^/internal/wasm-gz/(?<wasm_dir>[a-f0-9]+)$ {
        internal;
        default_type application/wasm;
        add_header Content-Encoding "gzip" always;
        add_header Vary "Accept-Encoding" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /assets/wasm/$wasm_dir/simc.wasm.gz =404;
    }

    location ~ ^/assets/wasm/[a-f0-9]+/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location ~ ^/assets/wasm/[^/]+$ {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /service-worker.js =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /index.html =404;
    }

    location = / {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files /index.html =404;
    }

    location ~ ^/assets/(js|css)/ {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
