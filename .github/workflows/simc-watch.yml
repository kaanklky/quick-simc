name: Watch simc upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  SIMC_BRANCH: ${{ vars.SIMC_BRANCH || 'midnight' }}

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve upstream simc SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/simulationcraft/simc.git "${{ env.SIMC_BRANCH }}" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Read pinned simc SHA from latest release tag
        id: pinned
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          MSG=$(git for-each-ref --format='%(contents)' "refs/tags/$LAST_TAG" 2>/dev/null || echo "")
          SHA=$(printf '%s' "$MSG" | grep -oE 'simc-sha=[a-f0-9]+' | head -1 | cut -d= -f2 || true)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Tag patch bump
        if: steps.upstream.outputs.sha != steps.pinned.outputs.sha
        run: |
          STRIPPED="${{ steps.pinned.outputs.tag }}"
          STRIPPED="${STRIPPED#v}"
          IFS='.' read -r MAJ MIN PATCH <<< "$STRIPPED"
          NEW="v${MAJ}.${MIN}.$((PATCH+1))"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "Auto release: simc ${{ env.SIMC_BRANCH }}@${{ steps.upstream.outputs.sha }}
simc-sha=${{ steps.upstream.outputs.sha }}"
          git push origin "$NEW"
